[pytest]
testpaths = tests scripts services
asyncio_default_fixture_loop_scope = function
filterwarnings =
    # chromadb legacy embedding function
    ignore:legacy embedding function config:DeprecationWarning
    # SWIG __module__ attribute (pdfminer/reportlab)
    ignore:builtin type Swig.*has no __module__ attribute:DeprecationWarning
    # reportlab ast.NameConstant (Python 3.12+)
    ignore:ast\.(NameConstant|Num|Str|Bytes|Attribute) is deprecated:DeprecationWarning
    # joblib/loky process pool (third-party, no fix available)
    ignore::DeprecationWarning:loky
    ignore::DeprecationWarning:joblib
    ignore::UserWarning:loky
    ignore::UserWarning:joblib
