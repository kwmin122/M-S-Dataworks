[pytest]
testpaths = tests scripts services
asyncio_default_fixture_loop_scope = function
filterwarnings =
    # PyMuPDF/SWIG C extension: SWIG < 4.2.0 doesn't set __module__ on
    # SwigPyPacked/SwigPyObject/swigvarlink types. Python 3.13 warns about
    # this. Fix requires PyMuPDF to rebuild with SWIG >= 4.2.0 (upstream).
    # Harmless — only affects type introspection metadata, not functionality.
    ignore:builtin type Swig.*has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
    # pytest-asyncio 0.24: custom event_loop fixture deprecated in favor of loop_scope.
    # Migration blocked: session-scoped engine + function-scoped session fixtures
    # cause "another operation is in progress" with loop_scope. Intentionally deferred
    # until pytest-asyncio >= 1.0 stabilizes. See conftest.py comment.
    ignore:The event_loop fixture provided by pytest-asyncio has been redefined:DeprecationWarning
