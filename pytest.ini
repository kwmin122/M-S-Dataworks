[pytest]
testpaths = tests scripts services
asyncio_default_fixture_loop_scope = function
filterwarnings =
    # PyMuPDF/SWIG C extension: SWIG < 4.2.0 doesn't set __module__ on
    # SwigPyPacked/SwigPyObject/swigvarlink types. Python 3.13 warns about
    # this. Fix requires PyMuPDF to rebuild with SWIG >= 4.2.0 (upstream).
    # Harmless — only affects type introspection metadata, not functionality.
    ignore:builtin type Swig.*has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
